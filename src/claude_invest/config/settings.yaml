strategies:
  active:
  - mean_reversion
  - trend_pullback
  - momentum
  mean_reversion:
    best_for: ranging/choppy markets, large-cap stocks
    capital_pct: 0.25
    description: Buy oversold bounces, sell overbought. 73% win rate backtested.
    enabled: true
    name: RSI(2) Mean Reversion
    params:
      max_hold_bars: 5
      require_above_ma200: true
      rsi_buy_threshold: 25
      rsi_period: 2
      rsi_sell_threshold: 65
      stop_loss_pct: 0.01
      take_profit_pct: 0.02
  momentum:
    best_for: breakouts, discovery scanner
    capital_pct: 0.25
    description: Current strategy - MACD crossover + RSI sweet spot.
    enabled: true
    name: Momentum Breakout
    params:
      macd_crossover: true
      rsi_entry_max: 65
      rsi_entry_min: 30
      rsi_period: 14
      stop_loss_pct: 0.05
      take_profit_pct: 0.1
  trend_pullback:
    best_for: trending markets
    capital_pct: 0.25
    description: Buy dips in uptrends with custom MACD. 65-73% in trends.
    enabled: true
    name: MACD 5/35/5 Trend
    params:
      macd_fast: 5
      macd_signal: 5
      macd_slow: 35
      require_above_ma200: true
      rsi_buy_threshold: 40
      rsi_period: 14
      rsi_sell_threshold: 60
      stop_loss_pct: 0.02
      take_profit_pct: 0.04
trading_style: mixed
volatility_scalper:
  capital_pct: 0.25
  discovery:
    enabled: true
    lookback_days: 20
    min_atr_pct: 0.03
  enabled: true
  modes:
    dip_buying: true
    news_reaction: true
    rally_shorting: false
  name: Volatility Scalper
  params:
    bar_timeframe: 15Min
    dip_threshold: -0.03
    force_exit_time: '15:55'
    max_concurrent: 2
    max_hold_minutes: 120
    news_min_articles: 2
    news_sentiment_buy: -0.2
    news_sentiment_short: 0.4
    rally_threshold: 0.05
    rsi_overbought: 75
    rsi_oversold: 30
    rsi_period: 14
    stop_loss_pct: 0.03
    take_profit_pct: 0.03
