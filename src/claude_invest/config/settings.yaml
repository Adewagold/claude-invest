mode: paper
capital: 5000
max_positions: 8
max_per_ticker: 0.10
position_size_pct: 0.02
daily_loss_limit: -150
pdt_tracking: true

exit_strategy:
  stop_loss_pct: 0.05
  trailing_stop_pct: 0.03
  signal_exit: true

polling:
  market_open_interval: 5
  market_close_interval: 5
  midday_interval: 15
  crypto_interval: 60

discovery:
  min_relative_volume: 2.0
  min_news_count: 2
  sentiment_threshold: 0.3

trading_style: mixed

portfolio:
  allocation:
    safe: 0.30
    neutral: 0.40
    risk: 0.30
  drift_threshold: 0.10
  sectors:
    overrides:
      TRUMP/USD: "meme"
      DOGE/USD: "meme"
      SHIB/USD: "meme"
      BONK/USD: "meme"
      WIF/USD: "meme"
      PEPE/USD: "meme"
  time_horizon:
    short_term_max_days: 30
    long_term_min_days: 30

risk_tiers:
  safe:
    - bonds
    - reits
    - dividend
    - utilities
    - consumer_staples
  neutral:
    - large_cap
    - technology
    - healthcare
    - financial
    - industrial
    - energy
  risk:
    - small_cap
    - biotech
    - meme
    - crypto
    - penny
    - speculative

strategies:
  active:
    - mean_reversion
    - trend_pullback
    - momentum

  mean_reversion:
    name: "RSI(2) Mean Reversion"
    description: "Buy oversold bounces, sell overbought. 73% win rate backtested."
    enabled: true
    capital_pct: 0.33
    params:
      rsi_period: 2
      rsi_buy_threshold: 25
      rsi_sell_threshold: 65
      max_hold_bars: 5
      require_above_ma200: true
      stop_loss_pct: 0.01
      take_profit_pct: 0.02
    best_for: "ranging/choppy markets, large-cap stocks"

  trend_pullback:
    name: "MACD 5/35/5 Trend"
    description: "Buy dips in uptrends with custom MACD. 65-73% in trends."
    enabled: true
    capital_pct: 0.34
    params:
      macd_fast: 5
      macd_slow: 35
      macd_signal: 5
      rsi_period: 14
      rsi_buy_threshold: 40
      rsi_sell_threshold: 60
      require_above_ma200: true
      stop_loss_pct: 0.02
      take_profit_pct: 0.04
    best_for: "trending markets"

  momentum:
    name: "Momentum Breakout"
    description: "Current strategy - MACD crossover + RSI sweet spot."
    enabled: true
    capital_pct: 0.33
    params:
      rsi_period: 14
      rsi_entry_min: 30
      rsi_entry_max: 65
      macd_crossover: true
      stop_loss_pct: 0.05
      take_profit_pct: 0.10
    best_for: "breakouts, discovery scanner"
