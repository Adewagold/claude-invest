mode: paper
capital: 5000
max_positions: 8
max_per_ticker: 0.10
position_size_pct: 0.02
daily_loss_limit: -150
pdt_tracking: true

exit_strategy:
  stop_loss_pct: 0.05
  trailing_stop_pct: 0.03
  signal_exit: true

polling:
  market_open_interval: 5
  market_close_interval: 5
  midday_interval: 15
  crypto_interval: 60

discovery:
  min_relative_volume: 2.0
  min_news_count: 2
  sentiment_threshold: 0.3

trading_style: mixed

portfolio:
  allocation:
    safe: 0.30
    neutral: 0.40
    risk: 0.30
  drift_threshold: 0.10
  sectors:
    overrides:
      TRUMP/USD: "meme"
      DOGE/USD: "meme"
      SHIB/USD: "meme"
      BONK/USD: "meme"
      WIF/USD: "meme"
      PEPE/USD: "meme"
  time_horizon:
    short_term_max_days: 30
    long_term_min_days: 30

risk_tiers:
  safe:
    - bonds
    - reits
    - dividend
    - utilities
    - consumer_staples
  neutral:
    - large_cap
    - technology
    - healthcare
    - financial
    - industrial
    - energy
  risk:
    - small_cap
    - biotech
    - meme
    - crypto
    - penny
    - speculative
